name: Backfill Historical Data

on:
  workflow_dispatch:
    inputs:
      token:
        description: 'Token to backfill'
        required: true
        type: choice
        options:
          - ALL
          - AZTEC
          - UAI
          - SPACE
          - GWEI
          - TRIA
          - SKR
          - BIRB

permissions:
  contents: write

concurrency:
  group: backfill-data
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 2 hours max

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run historical data backfill
        run: |
          if [ "${{ github.event.inputs.token }}" = "ALL" ]; then
            python scripts/backfill_history.py
          else
            python scripts/backfill_history.py --token ${{ github.event.inputs.token }}
          fi
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          BSCTrace_API_KEY: ${{ secrets.BSCTrace_API_KEY }}
          HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}

      - name: Verify data integrity
        run: |
          echo "=== Checking history directory ==="
          ls -lh data/history/ | head -20
          echo ""
          echo "=== Total files ==="
          ls data/history/*.jsonl | wc -l
          echo ""
          echo "=== Total size ==="
          du -sh data/history/

      - name: Commit and push historical data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history/
          if [ "${{ github.event.inputs.token }}" = "ALL" ]; then
            git diff --quiet && git diff --staged --quiet || git commit -m "data: Historical backfill (all tokens) to $(date -u +'%Y-%m-%d')"
          else
            git diff --quiet && git diff --staged --quiet || git commit -m "data: Historical backfill (${{ github.event.inputs.token }}) to $(date -u +'%Y-%m-%d')"
          fi
          for i in 1 2 3; do
            git pull --rebase origin main || git rebase --abort && git pull --no-rebase origin main
            git push && break
            echo "Push attempt $i failed, retrying in 10s..."
            sleep 10
          done
