name: Backfill Historical Data

on:
  workflow_dispatch:  # Manual trigger only

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 2 hours max

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run historical data backfill
        run: python scripts/backfill_history.py
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          BSCTrace_API_KEY: ${{ secrets.BSCTrace_API_KEY }}
          HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}

      - name: Verify data integrity
        run: |
          echo "=== Checking history directory ==="
          ls -lh data/history/ | head -20
          echo ""
          echo "=== Total files ==="
          ls data/history/*.jsonl | wc -l
          echo ""
          echo "=== Total size ==="
          du -sh data/history/

      - name: Commit and push historical data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history/
          git diff --quiet && git diff --staged --quiet || git commit -m "data: Historical backfill from TGE to $(date -u +'%Y-%m-%d')"
          git push
