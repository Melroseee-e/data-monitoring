name: Update On-Chain Data

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

concurrency:
  group: update-on-chain-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Normalize exchange labels
        run: python scripts/normalize_labels.py

      - name: Collect on-chain data
        run: python scripts/data_collector.py
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          BSCTrace_API_KEY: ${{ secrets.BSCTrace_API_KEY }}
          HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
          HELIUS_API_KEY_2: ${{ secrets.HELIUS_API_KEY_2 }}
          HELIUS_API_KEYS: ${{ secrets.HELIUS_API_KEY }},${{ secrets.HELIUS_API_KEY_2 }}

      - name: Generate TGE chart data
        run: python scripts/generate_tge_chart_data.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "data: $(date -u +'%Y-%m-%d %H:%M UTC')"
            for i in 1 2 3; do
              if ! git pull --rebase origin main; then
                git rebase --abort || true
                git pull --no-rebase origin main
              fi
              if git push; then
                break
              fi
              if [ "$i" -eq 3 ]; then
                echo "Push failed after 3 attempts."
                exit 1
              fi
              echo "Push attempt $i failed, retrying in 10s..."
              sleep 10
            done
          else
            echo "No data changes to commit."
          fi
