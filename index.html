<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Terminal | Flow Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>

<style>
  :root {
    --bg-base: #000000;
    --bg-panel: #09090B;
    --bg-hover: #18181B;
    --border-color: #27272A;
    --text-main: #F4F4F5;
    --text-muted: #A1A1AA;
    --accent: #3B82F6;
    --inflow: #00FFA3;
    --outflow: #FF4D4D;
    --font-ui: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  body.theme-light {
    --bg-base: #FAF8F5;
    --bg-panel: #FFFFFF;
    --bg-hover: #F4F4F5;
    --border-color: #E4E4E7;
    --text-main: #09090B;
    --text-muted: #71717A;
    --accent: #2563EB;
    --inflow: #059669;
    --outflow: #DC2626;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background-color: var(--bg-base);
    color: var(--text-main);
    font-family: var(--font-ui);
    height: 100vh;
    display: flex;
    overflow: hidden;
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
  }

  /* SIDEBAR */
  .sidebar {
    width: 260px;
    border-right: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    background: var(--bg-panel);
  }
  .brand {
    padding: 16px;
    border-bottom: 1px solid var(--border-color);
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .brand::before { content: ''; width: 8px; height: 8px; background: var(--accent); border-radius: 50%; }
  
  .search-box { padding: 12px; border-bottom: 1px solid var(--border-color); }
  .search-box input {
    width: 100%; background: var(--bg-base); border: 1px solid var(--border-color);
    color: var(--text-main); padding: 8px 12px; border-radius: 4px; font-size: 12px; outline: none;
  }
  
  .token-list { flex: 1; overflow-y: auto; }
  .token-item {
    padding: 10px 16px; border-bottom: 1px solid var(--border-color);
    cursor: pointer; display: flex; justify-content: space-between; align-items: center;
  }
  .token-item:hover { background: var(--bg-hover); }
  .token-item.active { background: var(--bg-hover); border-left: 3px solid var(--accent); padding-left: 13px; }
  .token-symbol { font-weight: 700; font-size: 13px; }
  .token-net { font-family: var(--font-mono); font-size: 12px; }

  /* MAIN CONTENT */
  .main-content { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  
  .top-bar {
    height: 52px; border-bottom: 1px solid var(--border-color);
    display: flex; align-items: center; padding: 0 20px;
    justify-content: space-between; background: var(--bg-panel);
  }
  .top-bar-left { display: flex; align-items: center; gap: 20px; }
  .active-token-title { font-size: 18px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
  
  #timeRangeDisplay {
    font-size: 11px; font-family: var(--font-mono); color: var(--accent);
    background: rgba(37, 99, 235, 0.1); padding: 2px 8px; border-radius: 4px; font-weight: 700;
  }
  
  .kpi-mini-group { display: flex; gap: 24px; }
  .kpi-mini { display: flex; flex-direction: column; }
  .kpi-mini-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; }
  .kpi-mini-val { font-family: var(--font-mono); font-weight: 700; font-size: 14px; }

  .panes-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .pane-row { display: flex; flex: 1; min-height: 0; }
  .pane-row.top { flex: 1.5; border-bottom: 1px solid var(--border-color); }
  .pane { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .pane.left { border-right: 1px solid var(--border-color); }
  
  .pane-header {
    padding: 10px 16px; font-size: 13px; font-weight: 800; text-transform: uppercase;
    color: var(--text-main); border-bottom: 1px solid var(--border-color);
    background: var(--bg-panel); display: flex; justify-content: space-between; letter-spacing: 0.5px;
  }
  .pane-body { flex: 1; padding: 16px; background: var(--bg-base); position: relative; display: flex; flex-direction: column; min-height: 0; overflow-y: auto; }

  .pos { color: var(--inflow); }
  .neg { color: var(--outflow); }
  
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 10px 8px; text-align: right; border-bottom: 1px solid var(--border-color); }
  th:first-child, td:first-child { text-align: left; }
  th { font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; background: rgba(0,0,0,0.02); }
  td { font-family: var(--font-mono); font-size: 12px; font-weight: 600; }
  tr:hover td { background: var(--bg-hover); }

  #themeToggle {
    background: transparent; border: 1px solid var(--border-color); color: var(--text-main);
    padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600;
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="brand">INTELLIGENCE TERMINAL</div>
  <div class="search-box"><input type="text" id="tokenSearch" placeholder="Search tokens..."></div>
  <div class="token-list" id="tokenList"></div>
</div>

<div class="main-content">
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="active-token-title" id="headerTitle">---</div>
      <div id="timeRangeDisplay" style="display:none;"></div>
      <div class="kpi-mini-group">
        <div class="kpi-mini"><span class="kpi-mini-label">Inflow</span><span class="kpi-mini-val pos" id="kpiInflow">0</span></div>
        <div class="kpi-mini"><span class="kpi-mini-label">Outflow</span><span class="kpi-mini-val neg" id="kpiOutflow">0</span></div>
        <div class="kpi-mini"><span class="kpi-mini-label">Net</span><span class="kpi-mini-val" id="kpiNet">0</span></div>
      </div>
    </div>
    <button id="themeToggle">☀️ Light</button>
  </div>

  <div class="panes-container">
    <div class="pane-row top">
      <div class="pane">
        <div class="pane-header">
          <div style="display: flex; gap: 16px;">
            <span class="trend-tab active" data-view="daily" style="cursor:pointer; border-bottom: 2px solid var(--accent);">Flow History</span>
            <span class="trend-tab" data-view="cumulative" style="cursor:pointer; color: var(--text-muted);">Cumulative (TGE)</span>
          </div>
        </div>
        <div class="pane-body"><div id="trendChart" style="flex:1;"></div></div>
      </div>
    </div>
    <div class="pane-row">
      <div class="pane left" style="flex: 0.7;">
        <div class="pane-header">Exchange Breakdown</div>
        <div class="pane-body" style="padding:0;"><table><thead><tr><th>Exchange</th><th>Inflow</th><th>Outflow</th><th>Net</th></tr></thead><tbody id="exchangeTableBody"></tbody></table></div>
      </div>
      <div class="pane">
        <div class="pane-header">Funds Routing</div>
        <div class="pane-body" style="padding:0; overflow:hidden;"><div id="sankeyChart" style="flex:1;"></div></div>
      </div>
    </div>
  </div>
</div>

<script>
const DATA_URL = '../data/latest_data.json?cb=' + Date.now();
const DAILY_URL = '../data/daily_summary.json?cb=' + Date.now();
const HISTORY_URL = '../data/history_summary.json?cb=' + Date.now();

let rawData, dailyData, historyData, selectedToken;
let currentTrendView = 'daily';
let isUpdating = false;

function formatNum(n) {
  if (!n || isNaN(n)) return '0.00';
  const a = Math.abs(n);
  if (a >= 1e9) return (n/1e9).toFixed(2)+'B';
  if (a >= 1e6) return (n/1e6).toFixed(2)+'M';
  if (a >= 1e3) return (n/1e3).toFixed(2)+'K';
  return n.toLocaleString(undefined, {minimumFractionDigits:2});
}

function aggregateRangeData(start, end) {
  const agg = { exchanges: {} };
  const sT = start ? start.getTime() : -Infinity;
  const eT = end ? end.getTime() : Infinity;
  const sources = [dailyData, historyData].filter(Array.isArray);
  
  sources.forEach(src => {
    src.forEach(day => {
      const dT = new Date(day.date || day.timestamp).getTime();
      if (dT >= sT && dT <= eT && day.tokens?.[selectedToken]) {
        const t = day.tokens[selectedToken];
        const flows = t.exchanges || {};
        Object.entries(flows).forEach(([ex, f]) => {
          if (!agg.exchanges[ex]) agg.exchanges[ex] = { inflow:0, outflow:0, net_flow:0 };
          agg.exchanges[ex].inflow += (f.inflow || f.in || 0);
          agg.exchanges[ex].outflow += (f.outflow || f.out || 0);
          agg.exchanges[ex].net_flow += (f.net_flow || f.net || 0);
        });
        if (t.deployments) {
          t.deployments.forEach(d => {
            Object.entries(d.exchange_flows || {}).forEach(([ex, f]) => {
              if (!agg.exchanges[ex]) agg.exchanges[ex] = { inflow:0, outflow:0, net_flow:0 };
              agg.exchanges[ex].inflow += (f.inflow || 0);
              agg.exchanges[ex].outflow += (f.outflow || 0);
              agg.exchanges[ex].net_flow += (f.net_flow || 0);
            });
          });
        }
      }
    });
  });
  return agg;
}

function updateExchangeTable(data) {
  const b = document.getElementById('exchangeTableBody');
  const agg = data.exchanges || {};
  const sorted = Object.entries(agg).sort((a,b) => Math.abs(b[1].net_flow) - Math.abs(a[1].net_flow));
  b.innerHTML = sorted.map(([ex, f]) => `<tr>
    <td>${ex}</td><td class="pos">${formatNum(f.inflow)}</td><td class="neg">${formatNum(f.outflow)}</td>
    <td class="${f.net_flow>=0?'pos':'neg'}">${f.net_flow>=0?'+':''}${formatNum(f.net_flow)}</td>
  </tr>`).join('');
}

function updateSankey(data) {
  const div = document.getElementById('sankeyChart');
  const isL = document.body.classList.contains('theme-light');
  const agg = data.exchanges || {};
  const nodes = [selectedToken], sources=[], targets=[], values=[], colors=[];
  
  Object.entries(agg).forEach(([ex, f]) => {
    if (Math.abs(f.inflow) > 0 || Math.abs(f.outflow) > 0) {
      nodes.push(ex);
      const idx = nodes.length - 1;
      if (f.inflow > 0) { sources.push(idx); targets.push(0); values.push(f.inflow); colors.push('rgba(5,150,105,0.4)'); }
      if (f.outflow > 0) { sources.push(0); targets.push(idx); values.push(f.outflow); colors.push('rgba(220,38,38,0.4)'); }
    }
  });

  if (!values.length) { div.innerHTML = '<div style="padding:20px;text-align:center;">No flow data</div>'; return; }
  
  const plotData = [{
    type: 'sankey', orientation: 'h',
    node: { pad: 30, thickness: 10, label: nodes, color: nodes.map((_,i)=>i==0?'#3B82F6':(isL?'#E4E4E7':'#27272A')) },
    link: { source: sources, target: targets, value: values, color: colors }
  }];
  const layout = {
    autosize: true, height: Math.max(300, Math.min(500, nodes.length*35)),
    paper_bgcolor: 'transparent', plot_bgcolor: 'transparent',
    font: { color: isL?'#71717A':'#A1A1AA', size: 11 }, margin: { l: 10, r: 10, t: 30, b: 10 }
  };
  Plotly.react(div, plotData, layout, {displayModeBar: false, responsive: true, staticPlot: false, config: {transition: {duration: 0}}});
}

function updateTrendChart(token) {
  const sources = [dailyData, historyData].filter(Array.isArray);
  let master = [];
  sources.forEach(s => {
    s.forEach(day => {
      if (day.tokens?.[token]) master.push(day);
    });
  });
  master.sort((a,b) => new Date(a.date||a.timestamp) - new Date(b.date||b.timestamp));
  
  // Find first data point
  let startIdx = master.findIndex(d => (d.tokens[token].total_inflow || 0) > 0 || (d.tokens[token].total_outflow || 0) > 0);
  if (startIdx === -1) startIdx = 0;
  const filtered = master.slice(startIdx);

  const dates = filtered.map(d => d.date || d.timestamp);
  const inflows = filtered.map(d => d.tokens[token].total_inflow || 0);
  const outflows = filtered.map(d => d.tokens[token].total_outflow || 0);
  const nets = filtered.map(d => (d.tokens[token].total_inflow||0) - (d.tokens[token].total_outflow||0));
  
  let cum = 0;
  const cumulative = nets.map(n => cum += n);

  const isL = document.body.classList.contains('theme-light');
  const traces = currentTrendView === 'daily' ? [
    { x: dates, y: inflows, name: 'Inflow', type: 'bar', marker: { color: isL?'#059669':'#00FFA3' }, hovertemplate: '%{y:.3s}<extra></extra>' },
    { x: dates, y: outflows.map(v=>-v), name: 'Outflow', type: 'bar', marker: { color: isL?'#DC2626':'#FF4D4D' }, hovertemplate: '%{y:.3s}<extra></extra>' },
    { x: dates, y: nets, name: 'Net', type: 'scatter', mode: 'lines', line: { color: '#3B82F6', width: 2 } }
  ] : [
    { x: dates, y: cumulative, name: 'Cumulative', type: 'scatter', mode: 'lines', fill: 'tozeroy', hovertemplate: '%{y:.3s}<extra></extra>', line: { color: '#3B82F6', width: 3 } }
  ];

  const layout = {
    autosize: true, barmode: 'relative', paper_bgcolor: 'transparent', plot_bgcolor: 'transparent',
    font: { family: 'JetBrains Mono', color: isL?'#71717A':'#A1A1AA', size: 11 },
    margin: { l:60, r:20, t:20, b:20 }, hovermode: 'x unified',
    xaxis: { type: 'date', rangeslider: { visible: true, thickness: 0.05 }, rangeselector: { buttons: [ {count:7, label:'1W', step:'day'}, {count:1, label:'1M', step:'month'}, {step:'all', label:'ALL'} ] } },
    yaxis: { autorange: true, fixedrange: false, tickformat: '.2s', gridcolor: isL?'#E4E4E7':'#18181B', zeroline: true, zerolinecolor: isL?'#E4E4E7':'#27272A' }
  };

  const div = document.getElementById('trendChart');
  Plotly.react(div, traces, layout, {displayModeBar: false, responsive: true, config: {transition: {duration: 0}}});

  div.on('plotly_relayout', (ed) => {
    if (isUpdating) return;
    let s, e;
    if (ed['xaxis.range[0]']) { s = new Date(ed['xaxis.range[0]']); e = new Date(ed['xaxis.range[1]']); }
    else { s = null; e = null; }
    
    if (s) {
      document.getElementById('timeRangeDisplay').innerText = s.toISOString().split('T')[0] + ' - ' + e.toISOString().split('T')[0];
      document.getElementById('timeRangeDisplay').style.display = 'block';
    } else {
      document.getElementById('timeRangeDisplay').style.display = 'none';
    }
    
    const agg = aggregateRangeData(s, e);
    updateExchangeTable(agg);
    updateSankey(agg);
    
    // Auto-scale Y
    if (s) {
      const vis = filtered.filter(d => { const t = new Date(d.date||d.timestamp); return t >= s && t <= e; });
      if (vis.length) {
        const vals = currentTrendView === 'daily' ? 
          vis.flatMap(d => [d.tokens[token].total_inflow, -(d.tokens[token].total_outflow||0)]) :
          filtered.map((d,i) => ({t:new Date(d.date||d.timestamp), v:cumulative[i]})).filter(x => x.t >= s && x.t <= e).map(x=>x.v);
        const max = Math.max(...vals), min = Math.min(...vals), pad = (max-min)*0.1;
        Plotly.relayout(div, { 'yaxis.range': [min-pad, max+pad] });
      }
    }
  });
}

function updateDashboard() {
  if (!selectedToken || !rawData) return;
  isUpdating = true;
  const d = rawData.tokens[selectedToken];
  document.getElementById('headerTitle').innerText = selectedToken;
  document.getElementById('kpiInflow').innerText = formatNum(d.total_inflow);
  document.getElementById('kpiOutflow').innerText = formatNum(d.total_outflow);
  document.getElementById('kpiNet').innerText = formatNum(d.net_flow);
  
  const full = aggregateRangeData(null, null);
  updateExchangeTable(full);
  updateSankey(full);
  updateTrendChart(selectedToken);
  setTimeout(() => isUpdating = false, 500);
}

function renderTokenList(f = '') {
  const l = document.getElementById('tokenList');
  const toks = Object.keys(rawData.tokens).sort().filter(t => t.toLowerCase().includes(f.toLowerCase()));
  l.innerHTML = toks.map(t => `<div class="token-item ${t==selectedToken?'active':''}" data-token="${t}">
    <span class="token-symbol">${t}</span>
    <span class="token-net ${rawData.tokens[t].net_flow>=0?'pos':'neg'}">${formatNum(rawData.tokens[t].net_flow)}</span>
  </div>`).join('');
  l.onclick = (e) => {
    const i = e.target.closest('.token-item');
    if (i) { selectedToken = i.dataset.token; renderTokenList(f); updateDashboard(); }
  };
  if (!selectedToken && toks.length) { selectedToken = toks[0]; updateDashboard(); }
}

async function init() {
  const body = document.body;
  if (localStorage.getItem('theme') === 'light') body.classList.add('theme-light');
  document.getElementById('themeToggle').onclick = () => {
    body.classList.toggle('theme-light');
    localStorage.setItem('theme', body.classList.contains('theme-light') ? 'light' : 'dark');
    updateDashboard();
  };
  
  document.querySelectorAll('.trend-tab').forEach(t => t.onclick = () => {
    document.querySelectorAll('.trend-tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    currentTrendView = t.dataset.view;
    updateTrendChart(selectedToken);
  });

  const [r, d, h] = await Promise.all([ fetch(DATA_URL), fetch(DAILY_URL), fetch(HISTORY_URL) ].map(p => p.then(res => res.json()).catch(()=>null)));
  rawData = r; dailyData = d; historyData = h;
  renderTokenList();
  document.getElementById('tokenSearch').oninput = (e) => renderTokenList(e.target.value);
}

init();
</script>
</body>
</html>
