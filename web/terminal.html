<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Terminal | Flow Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>

<style>
  :root {
    --bg-base: #000000;
    --bg-panel: #09090B;
    --bg-hover: #18181B;
    --border-color: #27272A;
    --text-main: #F4F4F5;
    --text-muted: #A1A1AA;
    --accent: #3B82F6;
    --inflow: #00FFA3;
    --outflow: #FF4D4D;
    
    --font-ui: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  body.theme-light {
    --bg-base: #FAF8F5; /* Cosmic Latte base */
    --bg-panel: #FFFFFF;
    --bg-hover: #F4F4F5;
    --border-color: #E4E4E7;
    --text-main: #09090B;
    --text-muted: #71717A;
    --accent: #2563EB;
    --inflow: #059669;
    --outflow: #DC2626;
    background-color: #FAF8F5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background-color: var(--bg-base);
    color: var(--text-main);
    font-family: var(--font-ui);
    height: 100vh;
    display: flex;
    overflow: hidden;
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
  }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg-base); }
  ::-webkit-scrollbar-thumb { background: #3F3F46; border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: #52525B; }

  /* SIDEBAR (DefiLlama style navigation + Token List) */
  .sidebar {
    width: 260px;
    border-right: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    background: var(--bg-panel);
  }
  .brand {
    padding: 16px;
    border-bottom: 1px solid var(--border-color);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .brand::before {
    content: ''; width: 8px; height: 8px; background: var(--accent); border-radius: 50%;
  }
  .search-box {
    padding: 12px;
    border-bottom: 1px solid var(--border-color);
  }
  .search-box input {
    width: 100%;
    background: var(--bg-base);
    border: 1px solid var(--border-color);
    color: var(--text-main);
    padding: 8px 12px;
    border-radius: 4px;
    font-family: var(--font-ui);
    outline: none;
    font-size: 12px;
  }
  .search-box input:focus { border-color: var(--accent); }
  
  .token-list {
    flex: 1;
    overflow-y: auto;
  }
  .token-item {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border-color);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .token-item:hover { background: var(--bg-hover); }
  .token-item.active { background: var(--bg-hover); border-left: 2px solid var(--accent); padding-left: 14px; }
  .token-info { display: flex; flex-direction: column; gap: 2px; }
  .token-symbol { font-weight: 600; font-size: 13px; }
  .token-chain { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
  .token-net { font-family: var(--font-mono); font-size: 12px; text-align: right; }

  /* MAIN CONTENT (Bloomberg / Arkham Terminal Style) */
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  
  /* HEADER BAR */
  .top-bar {
    height: 52px;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    padding: 0 20px;
    justify-content: space-between;
    background: var(--bg-panel);
  }
  .top-bar-left { display: flex; align-items: center; gap: 20px; }
  .active-token-title { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .active-token-title .badge { font-size: 10px; padding: 2px 6px; background: var(--border-color); border-radius: 4px; }
  
  #timeRangeDisplay {
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--accent);
    background: rgba(37, 99, 235, 0.1);
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 600;
    display: none;
  }
  
  .kpi-mini-group { display: flex; gap: 24px; }
  .kpi-mini { display: flex; flex-direction: column; }
  .kpi-mini-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
  .kpi-mini-val { font-family: var(--font-mono); font-weight: 600; font-size: 14px; }

  /* PANES */
  .panes-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .pane-row {
    display: flex;
    flex: 1;
    min-height: 0;
  }
  .pane-row.top {
    flex: 1.4;
    border-bottom: 1px solid var(--border-color);
  }
  .pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .pane.left { border-right: 1px solid var(--border-color); }
  
  .pane-header { color: var(--text-main) !important; font-weight: 800 !important; font-size: 13px !important; 
    padding: 10px 16px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--text-main);
    border-bottom: 1px solid var(--border-color);
    background: var(--bg-panel);
    display: flex;
    justify-content: space-between;
    letter-spacing: 0.5px;
  }
  .pane-body {
    flex: 1;
    padding: 16px;
    background: var(--bg-base);
    position: relative;
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow-y: auto;
  }

  /* UTILS */
  .pos { color: var(--inflow); }
  .neg { color: var(--outflow); }
  
  /* TABLES */
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 8px 4px; text-align: right; border-bottom: 1px solid var(--border-color); }
  th:first-child, td:first-child { text-align: left; }
  th { font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-weight: 500; border-bottom: 1px solid var(--border-color); }
  td { font-family: var(--font-mono); font-size: 12px; }
  tr:hover td { background: var(--bg-hover); }

  #sankeyChart {
    width: 100%;
    margin: auto;
  }

</style>
</head>
<body>

<div class="sidebar">
  <div class="brand">INTELLIGENCE TERMINAL</div>
  <div class="search-box">
    <input type="text" id="tokenSearch" placeholder="Search tokens..." autocomplete="off">
  </div>
  <div class="token-list" id="tokenList">
    <!-- Populated by JS -->
  </div>
</div>

<div class="main-content">
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="active-token-title" id="headerTitle">
        --- <span class="badge">---</span>
      </div>
      <div id="timeRangeDisplay"></div>
      <div class="kpi-mini-group">
        <div class="kpi-mini">
          <span class="kpi-mini-label">Total Inflow</span>
          <span class="kpi-mini-val pos" id="kpiInflow">0.00</span>
        </div>
        <div class="kpi-mini">
          <span class="kpi-mini-label">Total Outflow</span>
          <span class="kpi-mini-val neg" id="kpiOutflow">0.00</span>
        </div>
        <div class="kpi-mini">
          <span class="kpi-mini-label">Net Flow</span>
          <span class="kpi-mini-val" id="kpiNet">0.00</span>
        </div>
      </div>
    </div>
    <div class="top-bar-right" style="display: flex; align-items: center; gap: 16px;">
      <div style="font-size:11px; color:var(--text-muted);" id="lastUpdated">Loading...</div>
      <button id="themeToggle" style="background:transparent; border:1px solid var(--border-color); color:var(--text-main); padding:4px 8px; border-radius:4px; cursor:pointer; font-family:var(--font-ui); font-size:11px;">☀️ Light</button>
    </div>
  </div>

  <div class="panes-container">
    <!-- TOP ROW: Time Series Chart -->
    <div class="pane-row top">
      <div class="pane">
        <div class="pane-header" style="position: relative; display: flex; align-items: center; justify-content: space-between;">
          <div style="display: flex; align-items: center; gap: 16px;">
            <span class="trend-tab active" data-view="daily" style="cursor:pointer; padding-bottom: 2px; border-bottom: 2px solid var(--accent);">Flow History</span>
            <span class="trend-tab" data-view="cumulative" style="cursor:pointer; padding-bottom: 2px; border-bottom: 2px solid transparent; color: var(--text-muted);">Cumulative (TGE)</span>
            <small style='color:var(--text-muted); font-weight:normal; margin-left:8px; text-transform:none;'>(Scroll / Pinch to Zoom)</small>
          </div>
        </div>
        <div class="pane-body">
          <div style="flex: 1; position: relative; min-height: 0;">
            <div id="trendChart" style="width:100%; height:100%;"></div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- BOTTOM ROW: Table & Sankey -->
    <div class="pane-row">
      <div class="pane left" style="flex: 0.6;">
        <div class="pane-header">Exchange Flows Breakdown</div>
        <div class="pane-body" style="padding:0;">
          <table id="exchangeTable">
            <thead>
              <tr>
                <th>Exchange</th>
                <th>Inflow</th>
                <th>Outflow</th>
                <th>Net Flow</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
      <div class="pane" style="display: flex; flex-direction: column;">
        <div class="pane-header">Funds Routing (Sankey)</div>
        <div class="pane-body" id="sankeyWrapper" style="padding:0; overflow:hidden; flex: 1; display: flex; align-items: stretch; justify-content: stretch;">
          <div id="sankeyChart" style="flex: 1; min-width: 0; min-height: 0;"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const DATA_URL = '../data/latest_data.json?v=' + Date.now();
const DAILY_URL = '../data/daily_summary.json?v=' + Date.now();
const HISTORY_URL = '../data/history_summary.json?v=' + Date.now();

let rawData = null;
let dailyData = null;
let historyData = null;
let selectedToken = null;
let charts = {};
let currentTrendView = 'daily';
let isUpdatingToken = false; // 'daily' or 'cumulative' // 'daily' or 'cumulative'
let lastNonEmptyFlowData = null;
let lastSankeyToken = null;

// Chart JS Defaults for Terminal
Chart.defaults.color = '#A1A1AA';
Chart.defaults.font.family = "'JetBrains Mono', monospace";
Chart.defaults.scale.grid.color = '#18181B';
Chart.defaults.scale.grid.borderColor = 'transparent';

function initTrendTabs() {
  document.querySelectorAll('.trend-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.trend-tab').forEach(t => {
        t.classList.remove('active');
        t.style.borderBottomColor = 'transparent';
        t.style.color = 'var(--text-muted)';
      });
      tab.classList.add('active');
      tab.style.borderBottomColor = 'var(--accent)';
      tab.style.color = 'var(--text-main)';
      currentTrendView = tab.dataset.view;
      if (selectedToken) updateTrendChart(selectedToken);
    });
  });
}

function formatNum(n) {
  if (n === null || n === undefined) return '0';
  if (Math.abs(n) >= 1e9) return (n / 1e9).toFixed(2) + 'B';
  if (Math.abs(n) >= 1e6) return (n / 1e6).toFixed(2) + 'M';
  if (Math.abs(n) >= 1e3) return (n / 1e3).toFixed(2) + 'K';
  return n.toFixed(2);
}

function initTheme() {
  const toggleBtn = document.getElementById('themeToggle');
  const body = document.body;
  
  // Check local storage
  const savedTheme = localStorage.getItem('terminalTheme');
  if (savedTheme === 'light') {
    body.classList.add('theme-light');
    toggleBtn.innerText = '🌙 Dark';
  }
  
  toggleBtn.addEventListener('click', () => {
    body.classList.toggle('theme-light');
    const isLight = body.classList.contains('theme-light');
    localStorage.setItem('terminalTheme', isLight ? 'light' : 'dark');
    toggleBtn.innerText = isLight ? '🌙 Dark' : '☀️ Light';
    if (selectedToken) { updateDashboard(); }
  });
}

async function init() {
  initTheme();
  initTrendTabs();
  try {
    const [dRes, dailyRes, hRes] = await Promise.all([
      fetch(DATA_URL).catch(()=>null),
      fetch(DAILY_URL).catch(()=>null),
      fetch(HISTORY_URL).catch(()=>null)
    ]);
    if(dRes && dRes.ok) rawData = await dRes.json();
    if(dailyRes && dailyRes.ok) dailyData = await dailyRes.json();
    if(hRes && hRes.ok) historyData = await hRes.json();
    
    // Pre-calculate cumulative stats for all tokens to fix 0.00 displays
    if (rawData && rawData.tokens && dailyData) {
      Object.keys(rawData.tokens).forEach(symbol => {
        let totalIn = 0, totalOut = 0;
        dailyData.forEach(day => {
          const t = day.tokens[symbol];
          if (t) {
            totalIn += (t.total_inflow || 0);
            totalOut += (t.total_outflow || 0);
          }
        });
        if (totalIn > rawData.tokens[symbol].total_inflow) {
          rawData.tokens[symbol].total_inflow = totalIn;
          rawData.tokens[symbol].total_outflow = totalOut;
          rawData.tokens[symbol].net_flow = totalIn - totalOut;
        }
      });
    }
    
    if(rawData && rawData.metadata) {
      document.getElementById('lastUpdated').innerText = 'UPDATED: ' + rawData.metadata.last_updated;
    }
    
    renderTokenList();
    
    document.getElementById('tokenSearch').addEventListener('input', (e) => {
      renderTokenList(e.target.value.toLowerCase());
    });
    
  } catch(e) {
    console.error("Init error", e);
  }
}

function renderTokenList(filter = '') {
  if(!rawData) return;
  const list = document.getElementById('tokenList');
  let tokens = Object.keys(rawData.tokens).sort();
  if(filter) {
    tokens = tokens.filter(t => t.toLowerCase().includes(filter));
  }
  
  if(!selectedToken && tokens.length > 0) {
    selectedToken = tokens[0];
  }
  
  list.innerHTML = tokens.map(t => {
    const d = rawData.tokens[t];
    const net = d.net_flow || 0;
    const isPos = net >= 0;
    const chain = d.deployments[0]?.chain || '';
    
    return `<div class="token-item ${t === selectedToken ? 'active' : ''}" data-token="${t}">
      <div class="token-info">
        <span class="token-symbol">${t}</span>
        <span class="token-chain">${chain}</span>
      </div>
      <div class="token-net ${isPos ? 'pos' : 'neg'}">
        ${isPos ? '+' : ''}${formatNum(net)}
      </div>
    </div>`;
  }).join('');
  
  // Use a single delegated listener on the list instead of individual listeners that get destroyed
  list.onclick = (e) => {
    const item = e.target.closest('.token-item');
    if (!item) return;
    
    const targetToken = item.dataset.token;
    if (selectedToken === targetToken) return;
    
    selectedToken = targetToken;
    lastNonEmptyFlowData = null;
    
    // Update active class manually
    list.querySelectorAll('.token-item').forEach(el => el.classList.remove('active'));
    item.classList.add('active');
    
    updateDashboard();
  };
  
  updateDashboard();
}


    
        function aggregateRangeData(start, end) {
      const aggregated = { exchanges: {} };
      const startTime = start ? new Date(start).getTime() : -Infinity;
      const endTime = end ? new Date(end).getTime() : Infinity;
      const searchSources = [dailyData, historyData].filter(s => Array.isArray(s));
      
      searchSources.forEach(source => {
        source.forEach(entry => {
          const dDate = new Date(entry.date || entry.timestamp);
          const dTime = dDate.getTime();
          if (dTime >= startTime && dTime <= endTime && entry.tokens && entry.tokens[selectedToken]) {
            const t = entry.tokens[selectedToken];
            const exData = t.exchanges || {}; 
            Object.entries(exData).forEach(([ex, flows]) => {
              if (!aggregated.exchanges[ex]) aggregated.exchanges[ex] = { net_flow: 0, inflow: 0, outflow: 0 };
              aggregated.exchanges[ex].inflow += (flows.inflow || flows.in || 0);
              aggregated.exchanges[ex].outflow += (flows.outflow || flows.out || 0);
              aggregated.exchanges[ex].net_flow += (flows.net_flow || flows.net || 0);
            });
          }
        });
      });
      return aggregated;
    }

function hasRenderableFlowData(data) {
  if (!data) return false;
  if (data.deployments) {
    return data.deployments.some(dep =>
      Object.values(dep.exchange_flows || {}).some(flows =>
        (Number(flows.inflow ?? flows.in ?? 0) > 0) ||
        (Number(flows.outflow ?? flows.out ?? 0) > 0)
      )
    );
  }
  if (data.exchanges) {
    return Object.values(data.exchanges).some(flows =>
      (Number(flows.inflow ?? flows.in ?? 0) > 0) ||
      (Number(flows.outflow ?? flows.out ?? 0) > 0)
    );
  }
  return false;
}

function syncFlowPanels(data, options = {}) {
  const { allowSnapshotFallback = false } = options;

  if (hasRenderableFlowData(data)) {
    lastNonEmptyFlowData = data;
    updateExchangeTable(data);
    updateSankey(data);
    return;
  }

  if (allowSnapshotFallback && rawData?.tokens?.[selectedToken] && hasRenderableFlowData(rawData.tokens[selectedToken])) {
    const snapshot = rawData.tokens[selectedToken];
    lastNonEmptyFlowData = snapshot;
    updateExchangeTable(snapshot);
    updateSankey(snapshot);
    return;
  }

  if (lastNonEmptyFlowData && hasRenderableFlowData(lastNonEmptyFlowData)) {
    updateExchangeTable(lastNonEmptyFlowData);
    updateSankey(lastNonEmptyFlowData);
    return;
  }

  // Final fallback: render empty state explicitly.
  updateExchangeTable(data || { exchanges: {} });
  updateSankey(data || { exchanges: {} });
}
    

function updateDashboard() {
  isUpdatingToken = true;
  if(!rawData || !selectedToken) return;
  const d = rawData.tokens[selectedToken];
  if(!d) return;
  
  // Header
  document.getElementById('headerTitle').innerHTML = `${selectedToken} <span class="badge">${d.deployments ? (d.deployments[0]?.chain || '') : ''}</span>`;
  document.getElementById('kpiInflow').innerText = formatNum(d.total_inflow);
  document.getElementById('kpiOutflow').innerText = formatNum(d.total_outflow);
  
  const netEl = document.getElementById('kpiNet');
  netEl.innerText = (d.net_flow >= 0 ? '+' : '') + formatNum(d.net_flow);
  netEl.className = 'kpi-mini-val ' + (d.net_flow >= 0 ? 'pos' : 'neg');
  
  // Initial render with ALL-TIME aggregated data (from start of time)
  document.getElementById('timeRangeDisplay').style.display = 'none';
  const fullHistory = aggregateRangeData(null, null);
  syncFlowPanels(fullHistory, { allowSnapshotFallback: true });
  
  updateTrendChart(selectedToken);
}

function updateExchangeTable(data) {
  const tbody = document.querySelector('#exchangeTable tbody');
  let agg = {};
  
  if (data.deployments) {
    data.deployments.forEach(dep => {
      Object.entries(dep.exchange_flows).forEach(([ex, flows]) => {
        if(!agg[ex]) agg[ex] = {inflow:0, outflow:0, net_flow:0};
        const inf = Number(flows.inflow ?? flows.in ?? 0);
        const outf = Number(flows.outflow ?? flows.out ?? 0);
        const net = Number(flows.net_flow ?? flows.net ?? (inf - outf));
        agg[ex].inflow += inf;
        agg[ex].outflow += outf;
        agg[ex].net_flow += net;
      });
    });
  } else if (data.exchanges) {
    Object.entries(data.exchanges).forEach(([ex, flows]) => {
      const inf = Number(flows.inflow ?? flows.in ?? 0);
      const outf = Number(flows.outflow ?? flows.out ?? 0);
      const net = Number(flows.net_flow ?? flows.net ?? (inf - outf));
      agg[ex] = { inflow: inf, outflow: outf, net_flow: net };
    });
  }
  
  const sortedEx = Object.entries(agg).sort((a,b) => Math.abs(b[1].net_flow || 0) - Math.abs(a[1].net_flow || 0));
  
   tbody.innerHTML = sortedEx.map(([ex, flows]) => {
    const net = Number(flows.net_flow ?? flows.net ?? 0);
    const isPos = net >= 0;
    return `<tr>
      <td style="font-family:var(--font-ui); font-weight:500;">${ex}</td>
      <td class="pos">${formatNum(Number(flows.inflow ?? flows.in ?? 0))}</td>
      <td class="neg">${formatNum(Number(flows.outflow ?? flows.out ?? 0))}</td>
      <td class="${isPos ? 'pos' : 'neg'}">${isPos ? '+' : ''}${formatNum(net)}</td>
    </tr>`;
  }).join('');
}

function updateTrendChart(token) {
  let sourceData = dailyData;
  let hasDataInDaily = dailyData && dailyData.some(d => d.tokens?.[token] && (d.tokens[token].total_inflow > 0 || d.tokens[token].total_outflow > 0));
  
  if (!hasDataInDaily && historyData && Array.isArray(historyData)) {
    sourceData = historyData;
  }

  if(!sourceData || !Array.isArray(sourceData)) return;
  
  let startIndex = 0;
  for (let i = 0; i < sourceData.length; i++) {
    const tData = sourceData[i].tokens?.[token];
    if (tData && (Math.abs(tData.total_inflow) > 0.01 || Math.abs(tData.total_outflow) > 0.01)) {
      startIndex = i;
      break;
    }
  }
  
  const tokenDataList = sourceData.slice(startIndex);

  const dates = [];
  const inflows = [];
  const outflows = [];
  const nets = [];
  const cumulative = [];
  let runningNet = 0;
  
  tokenDataList.forEach(entry => {
    const d = entry.date || entry.timestamp; if(!d) return; dates.push(d);
    const tData = entry.tokens?.[token];
    const inf = tData ? (tData.total_inflow || 0) : 0;
    const outf = tData ? (tData.total_outflow || 0) : 0;
    const net = inf - outf;
    
    inflows.push(inf);
    outflows.push(outf);
    nets.push(net);
    
    runningNet += net;
    cumulative.push(runningNet);
  });

  const isLight = document.body.classList.contains('theme-light');
  const textColor = isLight ? '#71717A' : '#A1A1AA';
  const gridColor = isLight ? '#E4E4E7' : '#18181B';
  const inflowColor = isLight ? '#059669' : '#00FFA3';
  const outflowColor = isLight ? '#DC2626' : '#FF4D4D';
  const netColor = '#3B82F6';

  const hoverTemp = `<b>%{x}</b><br>%{symbol}: %{y:,.2f}<extra></extra>`;

  let plotTraces = [];
  
  if (currentTrendView === 'daily') {
    plotTraces = [
      { 
        x: dates, y: inflows, name: 'Inflow', type: 'bar', marker: { color: inflowColor },
        hovertemplate: `<b>%{x}</b><br>Inflow: %{y:.3s}<extra></extra>`
      },
      { 
        x: dates, y: outflows.map(v => -v), name: 'Outflow', type: 'bar', marker: { color: outflowColor },
        hovertemplate: `<b>%{x}</b><br>Outflow: %{y:.3s}<extra></extra>`
      },
      { 
        x: dates, y: nets, name: 'Net Flow', type: 'scatter', mode: 'lines', line: { color: netColor, width: 2 },
        hovertemplate: `<b>%{x}</b><br>Net Flow: %{y:.3s}<extra></extra>`
      }
    ];
  } else {
    plotTraces = [
      { 
        x: dates, y: cumulative, name: 'Cumulative Net Flow', type: 'scatter', mode: 'lines', 
        fill: 'tozeroy', line: { color: netColor, width: 3 },
        fillcolor: isLight ? 'rgba(59, 130, 246, 0.1)' : 'rgba(59, 130, 246, 0.2)',
        hovertemplate: `<b>%{x}</b><br>Cumulative: %{y:.3s}<extra></extra>`
      }
    ];
  }

  const layout = {
    autosize: true, barmode: 'relative', paper_bgcolor: 'transparent', plot_bgcolor: 'transparent',
    font: { family: "'JetBrains Mono', monospace", color: textColor, size: 11 },
    margin: { l: 60, r: 20, t: 20, b: 20 },
    legend: { orientation: 'h', yanchor: 'bottom', y: 1.02, xanchor: 'right', x: 1 },
    hovermode: 'x unified',
    hoverlabel: {
      bgcolor: isLight ? '#FFFFFF' : '#09090B',
      bordercolor: isLight ? '#E4E4E7' : '#27272A',
      font: { family: "'JetBrains Mono', monospace", size: 12, color: isLight ? '#09090B' : '#F4F4F5' }
    },
    xaxis: {
      type: 'date', gridcolor: gridColor, zerolinecolor: gridColor,
      hoverformat: '%Y-%m-%d %H:%M',
      rangeslider: { visible: true, borderwidth: 1, bordercolor: gridColor, bgcolor: isLight ? '#F4F4F5' : '#09090B', thickness: 0.1 },
      rangeselector: {
        buttons: [
          { count: 1, label: '1D', step: 'day', stepmode: 'backward' },
          { count: 7, label: '1W', step: 'day', stepmode: 'backward' },
          { count: 1, label: '1M', step: 'month', stepmode: 'backward' },
          { step: 'all', label: 'ALL' }
        ],
        bgcolor: isLight ? '#FFFFFF' : '#18181B', activecolor: isLight ? '#E4E4E7' : '#27272A'
      }
    },
    yaxis: { gridcolor: gridColor, zerolinecolor: gridColor, tickformat: '.2s', autorange: true, fixedrange: false },
    transition: { duration: 0 }
  };

  const chartDiv = document.getElementById('trendChart');
  chartDiv.innerHTML = ''; 
  Plotly.newPlot(chartDiv, plotTraces, layout, {displayModeBar: false, responsive: true});
  setTimeout(() => { isUpdatingToken = false; }, 100);
  
  // Reset scroll position of token list item into view if needed
  const activeItem = document.querySelector('.token-item.active');
  if (activeItem) activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });


  // Dynamic Scaling & Sync Logic
  const currentInstanceToken = selectedToken;
  // Prevent duplicated listeners after repeated token/theme/view re-renders.
  if (typeof chartDiv.removeAllListeners === 'function') {
    chartDiv.removeAllListeners('plotly_relayout');
    chartDiv.removeAllListeners('plotly_doubleclick');
  }

  chartDiv.on('plotly_doubleclick', function() {
    // Run after Plotly internal reset to avoid race with its relayout sequence.
    setTimeout(() => {
      if (isUpdatingToken || selectedToken !== currentInstanceToken) return;
      document.getElementById('timeRangeDisplay').style.display = 'none';
      const fullAgg = aggregateRangeData(null, null);
      syncFlowPanels(fullAgg, { allowSnapshotFallback: true });
    }, 0);
  });

  chartDiv.on('plotly_relayout', function(eventData) {
    if (isUpdatingToken || selectedToken !== currentInstanceToken) return;
    let start, end;
    if (eventData['xaxis.range[0]'] && eventData['xaxis.range[1]']) {
      start = new Date(eventData['xaxis.range[0]']);
      end = new Date(eventData['xaxis.range[1]']);
    } else if (eventData['xaxis.autorange']) {
      Plotly.relayout(chartDiv, { 'yaxis.autorange': true });
      document.getElementById('timeRangeDisplay').style.display = 'none';
      const fullAgg = aggregateRangeData(null, null);
      syncFlowPanels(fullAgg, { allowSnapshotFallback: true });
      return;
    } else { return; }

    // Update Time Range Display
    const rangeDisplay = document.getElementById('timeRangeDisplay');
    const fmt = d => d.toISOString().split('T')[0];
    rangeDisplay.innerText = `${fmt(start)} → ${fmt(end)}`;
    rangeDisplay.style.display = 'block';

    // 1. Sync Table & Sankey (use canonical aggregator to keep field names consistent)
    const aggregated = aggregateRangeData(start, end);
    syncFlowPanels(aggregated, { allowSnapshotFallback: true });

    // 2. Dynamic Y-axis
    const visibleInflows = [], visibleOutflows = [], visibleNets = [], visibleCums = [];
    dates.forEach((d, i) => {
      const date = new Date(d);
      if (date >= start && date <= end) {
        visibleInflows.push(inflows[i] || 0);
        visibleOutflows.push(outflows[i] || 0);
        visibleNets.push(nets[i] || 0);
        visibleCums.push(cumulative[i] || 0);
      }
    });

    if (visibleInflows.length > 0) {
      let maxVal, minVal;
      if (currentTrendView === 'daily') {
        maxVal = Math.max(...visibleInflows, ...visibleNets);
        minVal = Math.min(...visibleOutflows.map(v => -v), ...visibleNets);
      } else {
        maxVal = Math.max(...visibleCums);
        minVal = Math.min(...visibleCums);
      }
      const span = maxVal - minVal;
      const padding = span === 0 ? 1 : span * 0.15;
      Plotly.relayout(chartDiv, { 'yaxis.range': [minVal - padding, maxVal + padding], 'yaxis.autorange': false });
    }
  });
}

function updateSankey(data) {
  const sankeyDiv = document.getElementById('sankeyChart');
  const isLight = document.body.classList.contains('theme-light');
  const sankeyNodeColor = isLight ? '#E4E4E7' : '#27272A';
  const sankeyTextColor = isLight ? '#71717A' : '#A1A1AA';

  const nodeLabels = [selectedToken];
  const nodeColors = ['#3B82F6'];
  const linkSources = [];
  const linkTargets = [];
  const linkValues = [];
  const linkColors = [];
  
  let nodeIdx = 1;

  if (data.deployments) {
    data.deployments.forEach(dep => {
      Object.entries(dep.exchange_flows).forEach(([ex, flows]) => {
        nodeLabels.push(ex);
        nodeColors.push(sankeyNodeColor);
        const inf = Number(flows.inflow ?? flows.in ?? 0);
        const outf = Number(flows.outflow ?? flows.out ?? 0);
        if(inf > 0) { linkSources.push(nodeIdx); linkTargets.push(0); linkValues.push(inf); linkColors.push(isLight ? 'rgba(5, 150, 105, 0.4)' : 'rgba(0, 255, 163, 0.4)'); }
        if(outf > 0) { linkSources.push(0); linkTargets.push(nodeIdx); linkValues.push(outf); linkColors.push(isLight ? 'rgba(220, 38, 38, 0.4)' : 'rgba(255, 77, 77, 0.4)'); }
        nodeIdx++;
      });
    });
  } else if (data.exchanges) {
    Object.entries(data.exchanges).forEach(([ex, flows]) => {
      nodeLabels.push(ex);
      nodeColors.push(sankeyNodeColor);
      const inf = Number(flows.inflow ?? flows.in ?? 0);
      const outf = Number(flows.outflow ?? flows.out ?? 0);
      if(inf > 0) { linkSources.push(nodeIdx); linkTargets.push(0); linkValues.push(inf); linkColors.push(isLight ? 'rgba(5, 150, 105, 0.4)' : 'rgba(0, 255, 163, 0.4)'); }
      if(outf > 0) { linkSources.push(0); linkTargets.push(nodeIdx); linkValues.push(outf); linkColors.push(isLight ? 'rgba(220, 38, 38, 0.4)' : 'rgba(255, 77, 77, 0.4)'); }
      nodeIdx++;
    });
  }

  if(linkValues.length === 0) {
    const hasExistingPlot = !!(sankeyDiv && sankeyDiv.data && sankeyDiv.data.length > 0);
    // For the same token, keep previous Sankey on transient empty aggregation (common during double-click reset).
    if (hasExistingPlot && lastSankeyToken === selectedToken) return;
    Plotly.purge('sankeyChart');
    sankeyDiv.innerHTML = `<div style="padding:20px;color:${sankeyTextColor};text-align:center;">No flow data available for this range</div>`;
    lastSankeyToken = selectedToken;
    return;
  }

  const chartHeight = Math.max(300, Math.min(500, nodeIdx * 35));
  const dynamicPadding = Math.max(10, Math.min(50, (chartHeight / (nodeIdx + 1))));

  const plotData = [{
    type: 'sankey', orientation: 'h',
    node: { pad: Math.min(dynamicPadding, 30), thickness: 18, line: { color: 'transparent', width: 0 }, label: nodeLabels, color: nodeColors },
    link: { source: linkSources, target: linkTargets, value: linkValues, color: linkColors }
  }];

  const layout = {
    autosize: true, font: { size: 11, color: sankeyTextColor, family: "'Inter', sans-serif" },
    paper_bgcolor: 'transparent', plot_bgcolor: 'transparent',
    margin: { l: 10, r: 10, t: 30, b: 10 },
    height: chartHeight,
    transition: { duration: 0 }
  };

  sankeyDiv.innerHTML = ''; 
  Plotly.react('sankeyChart', plotData, layout, {displayModeBar: false, responsive: true, hovermode: 'closest'});
  lastSankeyToken = selectedToken;
  setTimeout(() => Plotly.Plots.resize('sankeyChart'), 100);
}

// Ensure both charts resize correctly
window.addEventListener('resize', () => {
  if (document.getElementById('sankeyChart').data) Plotly.Plots.resize('sankeyChart');
  if (document.getElementById('trendChart').data) Plotly.Plots.resize('trendChart');
});


init();
</script>
