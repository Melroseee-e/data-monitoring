<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Terminal | Flow Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>

<style>
  :root {
    --bg-base: #000000;
    --bg-panel: #09090B;
    --bg-hover: #18181B;
    --border-color: #27272A;
    --text-main: #F4F4F5;
    --text-muted: #A1A1AA;
    --accent: #3B82F6;
    --inflow: #00FFA3;
    --outflow: #FF4D4D;
    
    --font-ui: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background-color: var(--bg-base);
    color: var(--text-main);
    font-family: var(--font-ui);
    height: 100vh;
    display: flex;
    overflow: hidden;
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
  }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg-base); }
  ::-webkit-scrollbar-thumb { background: #3F3F46; border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: #52525B; }

  /* SIDEBAR (DefiLlama style navigation + Token List) */
  .sidebar {
    width: 260px;
    border-right: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    background: var(--bg-panel);
  }
  .brand {
    padding: 16px;
    border-bottom: 1px solid var(--border-color);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .brand::before {
    content: ''; width: 8px; height: 8px; background: var(--accent); border-radius: 50%;
  }
  .search-box {
    padding: 12px;
    border-bottom: 1px solid var(--border-color);
  }
  .search-box input {
    width: 100%;
    background: var(--bg-base);
    border: 1px solid var(--border-color);
    color: var(--text-main);
    padding: 8px 12px;
    border-radius: 4px;
    font-family: var(--font-ui);
    outline: none;
    font-size: 12px;
  }
  .search-box input:focus { border-color: var(--accent); }
  
  .token-list {
    flex: 1;
    overflow-y: auto;
  }
  .token-item {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border-color);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .token-item:hover { background: var(--bg-hover); }
  .token-item.active { background: #18181B; border-left: 2px solid var(--accent); padding-left: 14px; }
  .token-info { display: flex; flex-direction: column; gap: 2px; }
  .token-symbol { font-weight: 600; font-size: 13px; }
  .token-chain { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
  .token-net { font-family: var(--font-mono); font-size: 12px; text-align: right; }

  /* MAIN CONTENT (Bloomberg / Arkham Terminal Style) */
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  
  /* HEADER BAR */
  .top-bar {
    height: 52px;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    padding: 0 20px;
    justify-content: space-between;
    background: var(--bg-panel);
  }
  .top-bar-left { display: flex; align-items: center; gap: 20px; }
  .active-token-title { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .active-token-title .badge { font-size: 10px; padding: 2px 6px; background: #27272A; border-radius: 4px; }
  
  .kpi-mini-group { display: flex; gap: 24px; }
  .kpi-mini { display: flex; flex-direction: column; }
  .kpi-mini-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
  .kpi-mini-val { font-family: var(--font-mono); font-weight: 600; font-size: 14px; }

  /* PANES */
  .panes-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .pane-row {
    display: flex;
    flex: 1;
    min-height: 0;
  }
  .pane-row.top {
    border-bottom: 1px solid var(--border-color);
  }
  .pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .pane.left { border-right: 1px solid var(--border-color); }
  
  .pane-header {
    padding: 10px 16px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border-color);
    background: var(--bg-base);
    display: flex;
    justify-content: space-between;
  }
  .pane-body {
    flex: 1;
    padding: 16px;
    background: var(--bg-base);
    position: relative;
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow-y: auto;
  }

  /* UTILS */
  .pos { color: var(--inflow); }
  .neg { color: var(--outflow); }
  
  /* TABLES */
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 8px 4px; text-align: right; border-bottom: 1px solid #18181B; }
  th:first-child, td:first-child { text-align: left; }
  th { font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-weight: 500; border-bottom: 1px solid var(--border-color); }
  td { font-family: var(--font-mono); font-size: 12px; }
  tr:hover td { background: var(--bg-hover); }

</style>
</head>
<body>

<div class="sidebar">
  <div class="brand">INTELLIGENCE TERMINAL</div>
  <div class="search-box">
    <input type="text" id="tokenSearch" placeholder="Search tokens..." autocomplete="off">
  </div>
  <div class="token-list" id="tokenList">
    <!-- Populated by JS -->
  </div>
</div>

<div class="main-content">
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="active-token-title" id="headerTitle">
        --- <span class="badge">---</span>
      </div>
      <div class="kpi-mini-group">
        <div class="kpi-mini">
          <span class="kpi-mini-label">Total Inflow</span>
          <span class="kpi-mini-val pos" id="kpiInflow">0.00</span>
        </div>
        <div class="kpi-mini">
          <span class="kpi-mini-label">Total Outflow</span>
          <span class="kpi-mini-val neg" id="kpiOutflow">0.00</span>
        </div>
        <div class="kpi-mini">
          <span class="kpi-mini-label">Net Flow</span>
          <span class="kpi-mini-val" id="kpiNet">0.00</span>
        </div>
      </div>
    </div>
    <div style="font-size:11px; color:var(--text-muted);" id="lastUpdated">Loading...</div>
  </div>

  <div class="panes-container">
    <!-- TOP ROW: Time Series Chart -->
    <div class="pane-row top">
      <div class="pane">
        <div class="pane-header">
          <span>Flow History (All Time) <small style='color:var(--text-muted); font-weight:normal; margin-left:8px;'>(Scroll / Pinch to Zoom)</small></span>
        </div>
        <div class="pane-body">
          <div style="flex: 1; position: relative; min-height: 0;">
            <canvas id="trendChart"></canvas>
          </div>
        </div>
      </div>
    </div>
    
    <!-- BOTTOM ROW: Table & Sankey -->
    <div class="pane-row">
      <div class="pane left" style="flex: 0.6;">
        <div class="pane-header">Exchange Flows Breakdown</div>
        <div class="pane-body" style="padding:0;">
          <table id="exchangeTable">
            <thead>
              <tr>
                <th>Exchange</th>
                <th>Inflow</th>
                <th>Outflow</th>
                <th>Net Flow</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
      <div class="pane">
        <div class="pane-header">Funds Routing (Sankey)</div>
        <div class="pane-body" id="sankeyWrapper" style="padding:0; overflow:hidden;">
          <div id="sankeyChart" style="flex: 1; min-height: 0; width: 100%;"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const DATA_URL = '../data/latest_data.json';
const DAILY_URL = '../data/daily_summary.json';

let rawData = null;
let dailyData = null;
let selectedToken = null;
let charts = {};

// Chart JS Defaults for Terminal
Chart.defaults.color = '#A1A1AA';
Chart.defaults.font.family = "'JetBrains Mono', monospace";
Chart.defaults.scale.grid.color = '#18181B';
Chart.defaults.scale.grid.borderColor = 'transparent';

function formatNum(n) {
  if (n === null || n === undefined) return '0';
  if (Math.abs(n) >= 1e9) return (n / 1e9).toFixed(2) + 'B';
  if (Math.abs(n) >= 1e6) return (n / 1e6).toFixed(2) + 'M';
  if (Math.abs(n) >= 1e3) return (n / 1e3).toFixed(2) + 'K';
  return n.toFixed(2);
}

async function init() {
  try {
    const [dRes, dailyRes] = await Promise.all([
      fetch(DATA_URL).catch(()=>null),
      fetch(DAILY_URL).catch(()=>null)
    ]);
    if(dRes && dRes.ok) rawData = await dRes.json();
    if(dailyRes && dailyRes.ok) dailyData = await dailyRes.json();
    
    if(rawData && rawData.metadata) {
      document.getElementById('lastUpdated').innerText = 'UPDATED: ' + rawData.metadata.last_updated;
    }
    
    renderTokenList();
    
    document.getElementById('tokenSearch').addEventListener('input', (e) => {
      renderTokenList(e.target.value.toLowerCase());
    });
    
  } catch(e) {
    console.error("Init error", e);
  }
}

function renderTokenList(filter = '') {
  if(!rawData) return;
  const list = document.getElementById('tokenList');
  let tokens = Object.keys(rawData.tokens).sort();
  if(filter) {
    tokens = tokens.filter(t => t.toLowerCase().includes(filter));
  }
  
  if(!selectedToken && tokens.length > 0) {
    selectedToken = tokens[0];
  }
  
  list.innerHTML = tokens.map(t => {
    const d = rawData.tokens[t];
    const net = d.net_flow || 0;
    const isPos = net >= 0;
    const chain = d.deployments[0]?.chain || '';
    
    return `<div class="token-item ${t === selectedToken ? 'active' : ''}" data-token="${t}">
      <div class="token-info">
        <span class="token-symbol">${t}</span>
        <span class="token-chain">${chain}</span>
      </div>
      <div class="token-net ${isPos ? 'pos' : 'neg'}">
        ${isPos ? '+' : ''}${formatNum(net)}
      </div>
    </div>`;
  }).join('');
  
  document.querySelectorAll('.token-item').forEach(el => {
    el.addEventListener('click', () => {
      selectedToken = el.dataset.token;
      renderTokenList(filter); // Re-render to update active state
      updateDashboard();
    });
  });
  
  updateDashboard();
}

function updateDashboard() {
  if(!rawData || !selectedToken) return;
  const d = rawData.tokens[selectedToken];
  if(!d) return;
  
  // Header
  document.getElementById('headerTitle').innerHTML = `${selectedToken} <span class="badge">${d.deployments[0]?.chain || ''}</span>`;
  document.getElementById('kpiInflow').innerText = formatNum(d.total_inflow);
  document.getElementById('kpiOutflow').innerText = formatNum(d.total_outflow);
  
  const netEl = document.getElementById('kpiNet');
  netEl.innerText = (d.net_flow >= 0 ? '+' : '') + formatNum(d.net_flow);
  netEl.className = 'kpi-mini-val ' + (d.net_flow >= 0 ? 'pos' : 'neg');
  
  updateExchangeTable(d);
  updateTrendChart(selectedToken);
  updateSankey(d);
}

function updateExchangeTable(data) {
  const tbody = document.querySelector('#exchangeTable tbody');
  
  // Aggregate across deployments
  const agg = {};
  data.deployments.forEach(dep => {
    Object.entries(dep.exchange_flows).forEach(([ex, flows]) => {
      if(!agg[ex]) agg[ex] = {in:0, out:0, net:0};
      agg[ex].in += flows.inflow;
      agg[ex].out += flows.outflow;
      agg[ex].net += (flows.inflow - flows.outflow);
    });
  });
  
  const sortedEx = Object.entries(agg).sort((a,b) => Math.abs(b[1].net) - Math.abs(a[1].net));
  
  tbody.innerHTML = sortedEx.map(([ex, flows]) => {
    const isPos = flows.net >= 0;
    return `<tr>
      <td style="font-family:var(--font-ui); font-weight:500;">${ex}</td>
      <td class="pos">${formatNum(flows.in)}</td>
      <td class="neg">${formatNum(flows.out)}</td>
      <td class="${isPos ? 'pos' : 'neg'}">${isPos ? '+' : ''}${formatNum(flows.net)}</td>
    </tr>`;
  }).join('');
}

function updateTrendChart(token) {
  if(!dailyData || !Array.isArray(dailyData)) return;
  
  const dates = [];
  const inflows = [];
  const outflows = [];
  const nets = [];
  
  // dailyData is an array: [{ date: "YYYY-MM-DD", tokens: { "PUMP": { total_inflow, total_outflow, net_flow } } }]
  dailyData.forEach(day => {
    dates.push(day.date);
    const tData = day.tokens[token];
    if(tData) {
      inflows.push(tData.total_inflow || 0);
      outflows.push(tData.total_outflow || 0);
      nets.push(tData.net_flow || 0);
    } else {
      inflows.push(0); outflows.push(0); nets.push(0);
    }
  });

  const ctx = document.getElementById('trendChart').getContext('2d');
  if(charts.trend) charts.trend.destroy();
  
  charts.trend = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: dates, // Full YYYY-MM-DD
      datasets: [
        {
          type: 'line',
          label: 'Net Flow',
          data: nets,
          borderColor: '#3B82F6',
          borderWidth: 2,
          tension: 0,
          pointRadius: 0,
          pointHoverRadius: 4,
          fill: false,
          yAxisID: 'y'
        },
        {
          type: 'bar',
          label: 'Inflow',
          data: inflows,
          backgroundColor: '#00FFA3',
          yAxisID: 'y'
        },
        {
          type: 'bar',
          label: 'Outflow',
          data: outflows.map(v => -v), // display downwards
          backgroundColor: '#FF4D4D',
          yAxisID: 'y'
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      scales: {
        x: { 
          stacked: true,
          ticks: { maxTicksLimit: 12 } // Prevent overlapping x-axis labels
        },
        y: { 
          stacked: true,
          position: 'right',
          ticks: { callback: v => formatNum(v) }
        }
      },
      plugins: {
        legend: { position: 'top', align: 'end', labels: { boxWidth: 10 } },
        tooltip: {
          backgroundColor: '#09090B',
          borderColor: '#27272A',
          borderWidth: 1,
          titleFont: { family: 'Inter' },
          bodyFont: { family: 'JetBrains Mono' },
          callbacks: {
            label: function(context) {
              let label = context.dataset.label || '';
              if (label) { label += ': '; }
              if (context.parsed.y !== null) { label += formatNum(Math.abs(context.parsed.y)); }
              return label;
            }
          }
        },
        zoom: {
          pan: {
            enabled: true,
            mode: 'x',
            modifierKey: null,
          },
          zoom: {
            wheel: {
              enabled: true,
              speed: 0.1
            },
            pinch: {
              enabled: true
            },
            mode: 'x',
            drag: {
              enabled: true,
              backgroundColor: 'rgba(59, 130, 246, 0.2)',
              borderColor: '#3B82F6',
              borderWidth: 1
            }
          }
        }
      }
    }
  });
}

function updateSankey(data) {
  const nodeLabels = [selectedToken];
  const nodeColors = ['#3B82F6'];
  const linkSources = [];
  const linkTargets = [];
  const linkValues = [];
  const linkColors = [];
  
  let nodeIdx = 1;

  data.deployments.forEach(dep => {
    Object.entries(dep.exchange_flows).forEach(([ex, flows]) => {
      nodeLabels.push(ex);
      nodeColors.push('#27272A');
      
      if(flows.inflow > 0) {
        linkSources.push(nodeIdx);
        linkTargets.push(0);
        linkValues.push(flows.inflow);
        linkColors.push('rgba(0, 255, 163, 0.4)');
      }
      if(flows.outflow > 0) {
        linkSources.push(0);
        linkTargets.push(nodeIdx);
        linkValues.push(flows.outflow);
        linkColors.push('rgba(255, 77, 77, 0.4)');
      }
      nodeIdx++;
    });
  });

  if(linkValues.length === 0) {
    document.getElementById('sankeyChart').innerHTML = '<div style="padding:20px;color:#A1A1AA;text-align:center;">No flow data available</div>';
    return;
  }

  const plotData = [{
    type: 'sankey',
    orientation: 'h',
    node: {
      pad: 15,
      thickness: 20,
      line: { color: '#000', width: 0 },
      label: nodeLabels,
      color: nodeColors
    },
    link: {
      source: linkSources,
      target: linkTargets,
      value: linkValues,
      color: linkColors
    }
  }];

  const layout = {
    autosize: true,
    font: { size: 11, color: '#A1A1AA', family: "'Inter', sans-serif" },
    paper_bgcolor: 'transparent',
    plot_bgcolor: 'transparent',
    margin: { l: 20, r: 20, t: 20, b: 20 }
  };

  document.getElementById('sankeyChart').innerHTML = ''; // Clear empty state text
  Plotly.newPlot('sankeyChart', plotData, layout, {displayModeBar: false, responsive: true});
  
  // Ensure it resizes correctly
  window.addEventListener('resize', () => {
    Plotly.Plots.resize('sankeyChart');
  });
}

init();
</script>
</body>
</html>
